set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

set -g mouse on

set-window-option -g mode-keys vi
# Keep this >0 to reliably parse Escape-prefixed key sequences (arrows, meta keys),
# especially over slower/variable connections.
set -s escape-time 50

# Prefer OSC 52 clipboard integration over external tools (xclip/wl-copy), which can
# hang when no GUI/clipboard service is available.
set -g set-clipboard on

# Pane navigation that does not depend on arrow/meta escape sequences.
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

set -g status-position top
set -g status-left ""
set -g status on
set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# prefix I - install
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @themepack 'powerline/default/cyan'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
